{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R1 Lodge</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'gallery' %}">Gallery</a>
        <a href="{% url 'about' %}">About</a>
        <a href="{% url 'contact' %}">Contact</a>

        {% if user.is_authenticated and user.is_staff %}
            <a href="{% url 'manager_dashboard' %}">Dashboard</a>
            <a href="{% url 'admin:logout' %}">Logout</a>
        {% else %}
            <a href="/admin/login/?next=/manager-dashboard/">Manager Login</a>
        {% endif %}
    </nav>

    {% block content %}{% endblock %}

    <footer class="footer">
        <p>© 2026 R1 Lodge. All rights reserved.</p>
        <p>Alanamu Road, Mandate 3 Estate, Ilorin, Kwara State</p>
    </footer>

</body>
</html>
